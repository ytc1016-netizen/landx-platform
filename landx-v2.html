<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LandX</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
  max-width:500px;
  margin:auto;
}

/* Header */
.header{
  background:#111;
  color:#fff;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

/* 分區 */
.section{
  padding:10px;
}

.section h2{
  font-size:16px;
  margin:5px 0;
}

/* 卡片（APP風格） */
.card{
  display:flex;
  background:#fff;
  border-radius:10px;
  margin-bottom:10px;
  overflow:hidden;
}

.card img{
  width:40%;
  height:110px;
  object-fit:cover;
}

.info{
  padding:8px;
  flex:1;
}

.info h3{
  font-size:14px;
  margin:0;
}

.info p{
  font-size:12px;
  margin:2px 0;
}

/* 按鈕 */
.btn{
  background:#007bff;
  color:#fff;
  border:none;
  padding:6px;
  border-radius:5px;
  font-size:12px;
  width:100%;
  margin-top:3px;
}

/* LINE浮動 */
.line-btn{
  position:fixed;
  bottom:80px;
  right:10px;
  background:#00c300;
  color:#fff;
  padding:12px;
  border-radius:50%;
  font-size:20px;
}

/* 底部導航 */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:500px;
  background:#fff;
  display:flex;
  border-top:1px solid #ddd;
}

.footer div{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
}
</style>

</head>

<body>

<div class="header">🏠 LandX</div>

<div id="app"></div>

<div class="line-btn" onclick="goLineGlobal()">💬</div>

<div class="footer">
  <div>🏠 首頁</div>
  <div>🔥 熱門</div>
  <div>💰 投資</div>
  <div>👤 我的</div>
</div>

<script>

// ====== 初始化 ======
if(!localStorage.getItem("houses")){
  let demo = [
    createHouse("台中高投報套房",688),
    createHouse("台北精華區小宅",1280),
    createHouse("高雄低總價投資宅",498)
  ]
  localStorage.setItem("houses",JSON.stringify(demo))
}

function createHouse(title,price){
  return {
    id:Date.now()+Math.random(),
    title,
    price,
    img:"https://via.placeholder.com/300x200",

    createdAt:Date.now(),
    expireAt:Date.now()+60*24*60*60*1000,

    viewCount:0,
    clickCount:0,
    inquiryCount:0
  }
}

// ====== 工具 ======
function getList(){
  return JSON.parse(localStorage.getItem("houses"))||[]
}

function save(list){
  localStorage.setItem("houses",JSON.stringify(list))
}

// ====== 行為 ======
function addView(id){
  let list=getList()
  let h=list.find(x=>x.id===id)
  if(h){h.viewCount++}
  save(list)
}

function addInquiry(id){
  let list=getList()
  let h=list.find(x=>x.id===id)
  if(h){h.inquiryCount++}
  save(list)
}

// ====== UI效果 ======
function live(){ return Math.floor(Math.random()*5)+1 }

function fake(){ 
  let a=["🔥 昨天成交","🔥 3人詢問","🔥 熱門物件"]
  return a[Math.floor(Math.random()*a.length)]
}

// ====== LINE ======
function goLine(id){
  addInquiry(id)
  let h=getList().find(x=>x.id===id)
  let msg=`我對這個物件有興趣：${h.title} ${h.price}萬`
  window.open("https://line.me/R/ti/p/?text="+encodeURIComponent(msg))
}

function goLineGlobal(){
  window.open("https://line.me/")
}

// ====== 卡片 ======
function card(h){
  addView(h.id)

  return `
  <div class="card">
    <img src="${h.img}">
    <div class="info">
      <h3>${h.title}</h3>
      <p>💰 ${h.price}萬</p>
      <p style="color:red">🔥 ${live()}人正在看</p>
      <p style="color:green">${fake()}</p>
      <p>👀 ${h.viewCount||0} 💬 ${h.inquiryCount||0}</p>

      <button class="btn" onclick="goLine(${h.id})">立即詢問</button>
    </div>
  </div>
  `
}

// ====== 分區 ======
function render(){

  let list=getList()

  let hot=[...list].sort((a,b)=>b.viewCount-a.viewCount).slice(0,3)
  let newest=[...list].sort((a,b)=>b.createdAt-a.createdAt).slice(0,3)
  let cheap=[...list].sort((a,b)=>a.price-b.price).slice(0,3)

  let html=`

  <div class="section">
    <h2>🔥 熱門物件</h2>
    ${hot.map(card).join("")}
  </div>

  <div class="section">
    <h2>🆕 最新上架</h2>
    ${newest.map(card).join("")}
  </div>

  <div class="section">
    <h2>💰 低總價推薦</h2>
    ${cheap.map(card).join("")}
  </div>

  `

  document.getElementById("app").innerHTML=html
}

render()

</script>

</body>
</html>
