<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曜境 LandX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  padding-bottom:90px; /* 防擋底部 */
}

/* Header */
header{
  padding:20px;
  font-size:22px;
  color:#d4af37;
  font-weight:bold;
}

/* Hero */
.hero{
  height:45vh;
  background:url('https://images.unsplash.com/photo-1507089947367-19c1da9775ae') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  text-align:center;
  padding:20px;
}

/* Container */
.container{
  padding:15px;
}

/* Card */
.card{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

/* Button */
button{
  background:#d4af37;
  border:none;
  padding:12px;
  width:100%;
  border-radius:6px;
  margin-top:8px;
  font-size:15px;
}

/* Input */
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

/* Detail */
#detail{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:auto;
  padding:20px;
}

/* 浮動客服（核心） */
#floatWrap{
  position:fixed;
  bottom:15px;
  right:15px;
  z-index:999;
}

.float-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:10px;
  cursor:pointer;
  font-size:18px;
}

/* 主按鈕（小嵐） */
#mainBtn{
  background:#06c755;
}

/* 阿榮 */
#agentBtn{
  background:#d4af37;
}

/* 展開面板 */
#panel{
  display:none;
  background:#222;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  width:220px;
}

.panel-btn{
  background:#333;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

/* Mobile */
@media(max-width:768px){
  .hero{font-size:18px;height:35vh;}
  .float-btn{
    width:45px;
    height:45px;
  }
}
</style>
</head>

<body>

<header>曜境 LandX</header>

<div class="hero">
  高端房地產 × AI × 投資決策平台
</div>

<div class="container">

<!-- 房源 -->
<div class="card">
  <h3>房源列表</h3>
  高雄豪宅 | 3000萬  
  <button onclick="openDetail()">查看</button>
</div>

<!-- 刊登 -->
<div class="card">
  <h3>刊登物件</h3>
  圖片（最多12張）
  <input type="file" multiple>
  影片（30MB）
  <input type="file">
</div>

<!-- 開發試算 -->
<div class="card">
  <h3>開發試算</h3>
  土地坪數
  <input id="land">
  容積率（例240）
  <input id="rate">
  <button onclick="calc()">試算</button>
  <div id="result"></div>
</div>

<!-- 貸款 -->
<div class="card">
  <h3>貸款試算</h3>
  房價（萬）
  <input id="price">
  利率（例2）
  <input id="interest">
  <button onclick="loan()">計算</button>
  <div id="loanResult"></div>
</div>

</div>

<!-- 物件頁 -->
<div id="detail">
  <h2>物件詳情</h2>
  <p>高雄豪宅 - 景觀戶</p>
  <button onclick="goLine()">💬 LINE諮詢</button>
  <button onclick="closeDetail()">關閉</button>
</div>

<!-- 浮動客服 -->
<div id="floatWrap">

  <div id="panel">
    <div class="panel-btn" onclick="goLine()">💬 LINE客服（小嵐）</div>
    <div class="panel-btn" onclick="goLine()">👨 專人帶看（阿榮）</div>
  </div>

  <div id="mainBtn" class="float-btn" onclick="togglePanel()">💬</div>
</div>

<script>

// 你的LINE（小嵐主入口）
function goLine(){
  window.open('https://line.me/R/ti/p/@616sqpkz');
}

// 面板開關（不擋畫面）
function togglePanel(){
  let p=document.getElementById('panel');
  p.style.display = (p.style.display==='block')?'none':'block';
}

// 物件頁
function openDetail(){
  document.getElementById('detail').style.display='block';
}
function closeDetail(){
  document.getElementById('detail').style.display='none';
}

// 開發試算（修正）
function calc(){
  let land=parseFloat(document.getElementById('land').value)||0;
  let rate=parseFloat(document.getElementById('rate').value)||0;

  let total=land*(rate/100);

  let text="可建坪："+total+"坪<br>";

  if(total>1000){
    text+="🔥 建議開發";
  }else{
    text+="⚠️ 利潤有限";
  }

  document.getElementById('result').innerHTML=text;
}

// 貸款試算
function loan(){
  let p=parseFloat(document.getElementById('price').value)||0;
  let i=parseFloat(document.getElementById('interest').value)||0;

  if(p===0||i===0){
    document.getElementById('loanResult').innerHTML="請輸入完整資料";
    return;
  }

  i=i/100/12;
  let m=240;

  let pay=p*i/(1-Math.pow(1+i,-m));

  document.getElementById('loanResult').innerHTML="月付："+Math.round(pay);
}

</script>

</body>
</html>
