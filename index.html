<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曜境 LandX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  padding-bottom:90px;
}

header{
  padding:20px;
  font-size:22px;
  color:#d4af37;
}

.hero{
  height:40vh;
  background:url('https://images.unsplash.com/photo-1507089947367-19c1da9775ae') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.container{padding:15px;}

.card{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button{
  background:#d4af37;
  border:none;
  padding:12px;
  width:100%;
  border-radius:6px;
  margin-top:8px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

/* 圖片預覽 */
.preview img{
  width:80px;
  margin:5px;
  border-radius:6px;
}

/* 影片 */
video{
  width:100%;
  margin-top:10px;
}

/* 浮動 */
#floatWrap{
  position:fixed;
  bottom:15px;
  right:15px;
}

.float-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:10px;
}

#mainBtn{background:#06c755;}
#panel{
  display:none;
  background:#222;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>曜境 LandX</header>

<div class="hero">
高端房地產 × 投資平台
</div>

<div class="container">

<!-- 房源 -->
<div class="card">
高雄豪宅 | 3000萬  
<button onclick="alert('物件頁展示')">查看</button>
</div>

<!-- 刊登 -->
<div class="card">
<h3>刊登物件</h3>

圖片（最多12張）
<input type="file" id="imgUpload" multiple>

<div class="preview" id="imgPreview"></div>

影片（30MB）
<input type="file" id="videoUpload">

<video id="videoPreview" controls></video>

</div>

<!-- 試算 -->
<div class="card">
<h3>開發試算</h3>

土地坪數<input id="land">
建蔽率<input id="build">
容積率<input id="rate">

<button onclick="calc()">試算</button>

<div id="result"></div>
</div>

</div>

<!-- 客服 -->
<div id="floatWrap">
<div id="panel">
<button onclick="goLine()">LINE諮詢</button>
<button onclick="goLine()">專人帶看</button>
</div>
<div id="mainBtn" class="float-btn" onclick="togglePanel()">💬</div>
</div>

<script>

// LINE
function goLine(){
  window.open('https://line.me/R/ti/p/@616sqpkz');
}

// 浮動
function togglePanel(){
  let p=document.getElementById('panel');
  p.style.display=p.style.display==='block'?'none':'block';
}

// 圖片預覽
document.getElementById('imgUpload').addEventListener('change', function(e){
  let preview=document.getElementById('imgPreview');
  preview.innerHTML='';

  let files=e.target.files;

  if(files.length>12){
    alert("最多12張");
    return;
  }

  for(let i=0;i<files.length;i++){
    let reader=new FileReader();
    reader.onload=function(ev){
      let img=document.createElement('img');
      img.src=ev.target.result;
      preview.appendChild(img);
    }
    reader.readAsDataURL(files[i]);
  }
});

// 影片預覽
document.getElementById('videoUpload').addEventListener('change', function(e){
  let file=e.target.files[0];

  if(file.size > 30*1024*1024){
    alert("影片超過30MB");
    return;
  }

  let url=URL.createObjectURL(file);
  document.getElementById('videoPreview').src=url;
});

// 試算
function calc(){

  let land=parseFloat(document.getElementById('land').value)||0;
  let build=parseFloat(document.getElementById('build').value)||0;
  let rate=parseFloat(document.getElementById('rate').value)||0;

  if(!land||!build||!rate){
    document.getElementById('result').innerHTML="請輸入完整資料";
    return;
  }

  build/=100;
  rate/=100;

  let base=land*build;
  let total=land*rate;
  let floors=rate/build;

  document.getElementById('result').innerHTML=`
  建築占地：約 ${base.toFixed(1)} 坪<br>
  總建坪：約 ${total.toFixed(1)} 坪<br>
  預估樓層：約 ${floors.toFixed(1)} 層<br>
  <hr>
  🔍 想看完整分析？<br>
  <button onclick="goLine()">LINE諮詢</button>
  `;
}

</script>

</body>
</html>
