<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曜境 LandX</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff;}
header{padding:15px;color:#d4af37;font-size:22px;}
.container{padding:15px;}
.card{background:#1a1a1a;padding:15px;margin-bottom:15px;border-radius:10px;}
button{background:#d4af37;border:none;padding:10px;width:100%;margin-top:8px;border-radius:6px;}
input,select{width:100%;padding:8px;margin:5px 0;border:none;border-radius:5px;}

#viewer{width:100%;height:250px;object-fit:cover;}
.preview{display:flex;overflow-x:auto;}
.preview img{width:70px;height:50px;margin:5px;cursor:pointer;}

#detail{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;overflow:auto;padding:20px;}
.closeBtn{position:fixed;top:10px;right:10px;background:red;padding:10px;border-radius:50%;}
</style>
</head>

<body>

<header>曜境 LandX</header>

<div class="container">

<div class="card">
<h3>📊 我的刊登額度</h3>
<div id="quota"></div>
</div>

<div class="card">
<h3>刊登物件</h3>

<input id="title" placeholder="物件名稱">
<input id="price" placeholder="價格">

<input type="file" id="imgUpload" multiple>

<button onclick="publish()">提交刊登</button>
</div>

<div class="card">
<h3>物件列表</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>🎤 阿榮3D導覽</h3>
<button onclick="playAgent()">▶ 播放</button>
<p>🎬 即將開放專業版本</p>
<button onclick="goLine()">預約體驗</button>
</div>

</div>

<!-- 物件頁 -->
<div id="detail">
<div class="closeBtn" onclick="closeDetail()">✕</div>
<h2 id="d_title"></h2>
<img id="viewer">
<p id="d_price"></p>
</div>

<!-- 登入 -->
<div id="loginBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;">
<div style="background:#1a1a1a;padding:20px;margin:50px;border-radius:10px;">
<h3>註冊</h3>
<input id="u_name" placeholder="姓名">
<input id="u_phone" placeholder="手機">
<button onclick="saveUser()">完成</button>
</div>
</div>

<script>

let FREE_QUOTA = 10;

// ===== 使用者 =====
function getUser(){
  return JSON.parse(localStorage.getItem("user"));
}

function saveUser(){
  let user={
    name:u_name.value,
    phone:u_phone.value,
    quota:FREE_QUOTA
  };
  localStorage.setItem("user",JSON.stringify(user));
  loginBox.style.display="none";
  updateQuota();
}

// ===== 額度 =====
function updateQuota(){
  let user=getUser();
  if(!user) return;
  quota.innerHTML="剩餘："+user.quota+" 筆";
}

// ===== 刊登 =====
function publish(){

  let user=getUser();

  if(!user){
    loginBox.style.display="block";
    return;
  }

  if(user.quota<=0){
    alert("已超過免費額度");
    return;
  }

  let houses=JSON.parse(localStorage.getItem("houses"))||[];

  let obj={
    title:title.value,
    price:price.value,
    img:"",
    expire:Date.now()+60*86400000
  };

  houses.push(obj);
  localStorage.setItem("houses",JSON.stringify(houses));

  user.quota--;
  localStorage.setItem("user",JSON.stringify(user));

  loadList();
  updateQuota();

  alert("刊登成功");
}

// ===== 列表 =====
function loadList(){

  let houses=JSON.parse(localStorage.getItem("houses"))||[];
  list.innerHTML="";

  let now=Date.now();

  houses.forEach((h,i)=>{

    if(h.expire<now) return;

    let div=document.createElement("div");
    div.innerHTML=`
    ${h.title} | ${h.price}
    <button onclick="view(${i})">查看</button>
    `;
    list.appendChild(div);
  });
}

// ===== 查看 =====
function view(i){
  let houses=JSON.parse(localStorage.getItem("houses"));
  let h=houses[i];

  d_title.innerText=h.title;
  d_price.innerText=h.price;

  detail.style.display="block";
}

function closeDetail(){
  detail.style.display="none";
}

// ===== 阿榮 =====
function playAgent(){
  alert("阿榮：本案具增值潛力");
}

// ===== LINE =====
function goLine(){
  window.open('https://line.me/R/ti/p/@616sqpkz');
}

// ===== 初始化 =====
updateQuota();
loadList();

</script>

</body>
</html>
