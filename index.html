<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曜境 LandX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  padding-bottom:90px;
}

header{
  padding:20px;
  font-size:22px;
  color:#d4af37;
}

.container{padding:15px;}

.card{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button{
  background:#d4af37;
  border:none;
  padding:10px;
  width:100%;
  border-radius:6px;
  margin-top:8px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

/* 物件頁 */
#detail{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  overflow-y:auto;
  padding:20px;
}

/* 關閉鍵 */
.closeBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:red;
  padding:10px;
  border-radius:50%;
}

/* 主圖 */
#viewer{
  width:100%;
  max-height:300px;
  object-fit:cover;
  border-radius:10px;
}

/* 縮圖 */
.preview{
  display:flex;
  overflow-x:auto;
}
.preview img{
  width:80px;
  height:60px;
  margin:5px;
  border-radius:5px;
  cursor:pointer;
  object-fit:cover;
}

/* 刪除鍵 */
.delBtn{
  position:absolute;
  background:red;
  color:#fff;
  font-size:12px;
  padding:2px 5px;
  border-radius:5px;
  cursor:pointer;
}

/* 客服 */
#floatWrap{
  position:fixed;
  bottom:15px;
  right:15px;
}

.float-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#06c755;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<header>曜境 LandX</header>

<div class="container">

<div class="card">
高雄豪宅 | 3000萬  
<button onclick="openDetail()">查看</button>
</div>

<div class="card">
<h3>刊登</h3>

圖片（最多12張）
<input type="file" id="imgUpload" multiple>

<div class="preview" id="imgPreview"></div>

影片（MP4 / MOV，30MB內）
<input type="file" id="videoUpload">

</div>

</div>

<!-- 物件頁 -->
<div id="detail">

<div class="closeBtn" onclick="closeDetail()">✕</div>

<h2>物件詳情</h2>

<img id="viewer">

<div class="preview" id="thumbs"></div>

<video id="videoPreview" controls style="width:100%;margin-top:10px;"></video>

<button onclick="goLine()">💬 LINE諮詢</button>
<button onclick="callAgent()">📞 聯絡阿榮</button>

</div>

<!-- 客服 -->
<div id="floatWrap">
<div class="float-btn" onclick="goLine()">💬</div>
</div>

<script>

let images=[];
let current=0;

function showImage(index){
  if(images.length===0) return;
  current=index;
  document.getElementById("viewer").src=images[current];
}

function renderThumbs(){
  let box=document.getElementById("thumbs");
  box.innerHTML="";

  images.forEach((img,i)=>{
    let el=document.createElement("img");
    el.src=img;
    el.onclick=()=>showImage(i);
    box.appendChild(el);
  });
}

// 圖片上傳
document.getElementById('imgUpload').addEventListener('change',function(e){

  images=[];
  let files=e.target.files;

  if(files.length>12){
    alert("最多12張");
    return;
  }

  let preview=document.getElementById("imgPreview");
  preview.innerHTML="";

  for(let i=0;i<files.length;i++){
    let reader=new FileReader();

    reader.onload=function(ev){
      images.push(ev.target.result);

      let wrapper=document.createElement("div");
      wrapper.style.position="relative";

      let img=document.createElement("img");
      img.src=ev.target.result;
      img.style.width="80px";

      let del=document.createElement("div");
      del.innerText="X";
      del.className="delBtn";

      del.onclick=function(){
        images.splice(i,1);
        wrapper.remove();
        renderThumbs();
      }

      wrapper.appendChild(img);
      wrapper.appendChild(del);
      preview.appendChild(wrapper);

      if(images.length===1) showImage(0);
      renderThumbs();
    }

    reader.readAsDataURL(files[i]);
  }
});

// 影片
document.getElementById('videoUpload').addEventListener('change',function(e){

  let file=e.target.files[0];
  if(!file) return;

  let types=["video/mp4","video/quicktime"];

  if(!types.includes(file.type)){
    alert("僅支援 MP4 / MOV");
    return;
  }

  if(file.size > 30*1024*1024){
    alert("影片超過30MB");
    return;
  }

  let url=URL.createObjectURL(file);
  let v=document.getElementById('videoPreview');
  v.src=url;
  v.load();
});

// LINE
function goLine(){
  window.open('https://line.me/R/ti/p/@616sqpkz');
}

// 電話
function callAgent(){
  window.location.href="tel:0912345678";
}

// 物件頁
function openDetail(){
  document.getElementById('detail').style.display='block';
}

function closeDetail(){
  document.getElementById('detail').style.display='none';
}

</script>

</body>
</html>
