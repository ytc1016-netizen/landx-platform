<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曜境 LandX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  padding-bottom:90px;
}

header{
  padding:20px;
  font-size:22px;
  color:#d4af37;
}

.container{padding:15px;}

.card{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button{
  background:#d4af37;
  border:none;
  padding:12px;
  width:100%;
  border-radius:6px;
  margin-top:8px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

/* 物件頁 */
#detail{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:auto;
  padding:20px;
}

/* 圖片 */
#viewer{
  width:100%;
  border-radius:10px;
}

.navBtn{
  width:48%;
  display:inline-block;
}

/* 浮動客服 */
#floatWrap{
  position:fixed;
  bottom:15px;
  right:15px;
}

#panel{
  display:none;
  background:#222;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.float-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#06c755;
}
</style>
</head>

<body>

<header>曜境 LandX</header>

<div class="container">

<div class="card">
高雄豪宅 | 3000萬  
<button onclick="openDetail()">查看</button>
</div>

<div class="card">
<h3>刊登</h3>
<input type="file" id="imgUpload" multiple>
<input type="file" id="videoUpload">
</div>

<div class="card">
<h3>開發試算</h3>
土地坪數<input id="land">
建蔽率<input id="build">
容積率<input id="rate">
<button onclick="calc()">試算</button>
<div id="result"></div>
</div>

</div>

<!-- 物件頁 -->
<div id="detail">

<h2>豪宅物件</h2>

<img id="viewer">

<button class="navBtn" onclick="prevImg()">上一張</button>
<button class="navBtn" onclick="nextImg()">下一張</button>

<video id="videoPreview" controls style="width:100%;margin-top:10px;"></video>

<button onclick="goLine()">💬 LINE諮詢</button>
<button onclick="callAgent()">📞 聯絡阿榮</button>

<button onclick="closeDetail()">關閉</button>

</div>

<!-- 客服 -->
<div id="floatWrap">
<div id="panel">
<button onclick="goLine()">LINE客服</button>
<button onclick="goLine()">專人帶看</button>
</div>
<div class="float-btn" onclick="togglePanel()">💬</div>
</div>

<script>

// LINE
function goLine(){
  window.open('https://line.me/R/ti/p/@616sqpkz');
}

// 電話（可改）
function callAgent(){
  window.location.href="tel:0912345678";
}

// 浮動
function togglePanel(){
  let p=document.getElementById('panel');
  p.style.display=p.style.display==='block'?'none':'block';
}

// 物件頁
function openDetail(){
  document.getElementById('detail').style.display='block';
}
function closeDetail(){
  document.getElementById('detail').style.display='none';
}

// 圖片輪播
let images=[];
let current=0;

function showImage(){
  if(images.length===0) return;
  document.getElementById("viewer").src=images[current];
}

function nextImg(){
  current=(current+1)%images.length;
  showImage();
}

function prevImg(){
  current=(current-1+images.length)%images.length;
  showImage();
}

// 上傳圖片
document.getElementById('imgUpload').addEventListener('change',function(e){
  images=[];
  let files=e.target.files;

  for(let i=0;i<files.length;i++){
    let reader=new FileReader();
    reader.onload=function(ev){
      images.push(ev.target.result);
      if(images.length===1) showImage();
    }
    reader.readAsDataURL(files[i]);
  }
});

// 影片
document.getElementById('videoUpload').addEventListener('change',function(e){
  let file=e.target.files[0];
  if(!file) return;

  let url=URL.createObjectURL(file);
  let v=document.getElementById('videoPreview');

  v.src=url;
  v.load();
});

// 試算
function calc(){
  let land=parseFloat(land.value)||0;
  let build=parseFloat(build.value)||0;
  let rate=parseFloat(rate.value)||0;

  if(!land||!build||!rate){
    result.innerHTML="請輸入完整資料";
    return;
  }

  build/=100;
  rate/=100;

  let base=land*build;
  let total=land*rate;
  let floors=rate/build;

  result.innerHTML=`
  建築占地：${base.toFixed(1)} 坪<br>
  總建坪：${total.toFixed(1)} 坪<br>
  樓層：約 ${floors.toFixed(1)} 層<br>
  <hr>
  <button onclick="goLine()">LINE諮詢完整分析</button>
  `;
}

</script>

</body>
</html>
